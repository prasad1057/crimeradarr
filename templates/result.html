<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Rate Prediction</title>
    <link rel="icon" href="static/images/favicon.png" type="image/png">

    <link rel="stylesheet" href="static/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap');

            .navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 20px;
                background: #0a0f1d;
            }

            .logo {
                font-size: 1.4rem;
                font-weight: bold;
            }

            .nav-buttons {
                display: flex;
                gap: 15px;
            }

            .nav-button {
                background: #222;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                transition: background 0.3s;
                font-size: 1rem;
            }

            .nav-button:hover {
                background: #444;
            }
    </style>
</head>

<body>
    <!-- Navbar -->
    <header class="navbar">
        <a href="/" class="logo" >CrimeRadar</a>
        <div class="nav-buttons">
            <button class="nav-button" onclick="redirectToIndex()">Crime Prediction</button>
            <button class="nav-button" onclick="goToNews()">Crime News</button>
            <a href="{{ url_for('dashboard') }}" style="text-decoration: none; color: inherit;">
            <button class="nav-button">Predictive Analysis</button></a>
            <button class="nav-button" onclick="goToHeatmap()">Crime Heatmap</button>
            <a class="nav-button" href="http://192.168.163.132:5000/">Crime AI</a>
        </div>
    </header>
    <header>
        <h1 class="title">Crime Rate Predictor</h1>
        <h2 class="tagline">Unlock safety: Reduce crime rate together</h2>
    </header>

    <section class="prediction">
        <table class="table2">
            <tr class="r1">
                <td class="label">
                    <label>Selected City Name :</label>
                </td>
                <td class="sel">
                    <select>
                        <option value="selected">{{city_name}}</option>
                </td>
            </tr>
            <tr class="r1">
                <td class="label">
                    <label>Selected Crime Type :</label>
                </td>
                <td class="sel">
                    <select>
                        <option value="selected">{{crime_type}}</option>
                </td>
            </tr>
            <tr class="r1">
                <td class="label">
                    <label>Selected Year :</label>
                </td>
                <td class="sel">
                    <select>
                        <option value="selected">{{year}}</option>
                </td>
            </tr>
        </table>

        <table class="table3">

            <tr class="r2"> 
                <td class=" result">Prediction :</td>
                <td class="result">{{crime_status}}</td>
            </tr>
            <tr class="r2">
                <td class="result">Estimated Crime Rate :</td>
                <td class="result">{{crime_rate}}</td>
            </tr>
            <tr class="r2">
                <td class="result">Estimated Number of Cases :</td>
                <td class="result">{{cases}}</td>
            </tr>
            <tr class="r2">
                <td class="result">Population (in Lakhs) :</td>
                <td class="result">{{population}}</td>
            </tr>
        </table>

        <div class="button2">
            <a href="http://127.0.0.1:5000">
                <input type="submit" class="btn id=" check_again"" value="Let's Check Again">
            </a>
        </div>

    </section>

    <script>
        function redirectToIndex() {
            window.location.href = "{{ url_for('index') }}";
        }

        function goToNews() {
            window.location.href = "{{ url_for('news') }}";
        }
        function goToHeatmap() {
            window.location.href = "{{ url_for('heatmap') }}";
        }
    </script>

</body>

</html>
