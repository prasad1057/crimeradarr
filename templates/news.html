<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crime News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            height: 100%;
        }
        .card-img-top {
            height: 180px;
            object-fit: cover;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgb(25, 50, 89);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color:white;
        }

        .nav-buttons {
            padding-left:20px;
            display: flex;
            gap: 15px;
        }

        .nav-button {
            background: #222;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1rem;
        }

        .nav-button:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <a href="/" class="logo" >CrimeRadar</a>
        <div class="nav-buttons">
            <button class="nav-button" onclick="redirectToIndex()">Crime Prediction</button>
            <button class="nav-button" onclick="goToNews()">Crime News</button>
            <a href="{{ url_for('dashboard') }}" style="text-decoration: none; color: inherit;">
            <button class="nav-button">Predictive Analysis</button></a>
            <button class="nav-button" onclick="goToHeatmap()">Crime Heatmap</button>
            <a class="nav-button" href="http://192.168.163.132:5000/">Crime AI</a>
        </div>
    </header>
    <div class="container mt-4">
        <h2 class="mb-4 text-center">Latest Crime News</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for article in articles %}
            <div class="col">
                <div class="card h-100">
                    {% if article.urlToImage %}
                    <img src="{{ article.urlToImage }}" class="card-img-top" alt="News Image">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ article.title }}</h5>
                        <p class="card-text">{{ article.description }}</p>
                    </div>
                    <div class="card-footer">
                        <a href="{{ article.url }}" class="btn btn-primary btn-sm" target="_blank">Read More</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>
        function redirectToIndex() {
            window.location.href = "{{ url_for('index') }}";
        }

        function goToNews() {
            window.location.href = "{{ url_for('news') }}";
        }
        function goToHeatmap() {
            window.location.href = "{{ url_for('heatmap') }}";
        }
    </script>
</body>
</html>
