<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crime Heatmap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color:rgb(17, 28, 59);
            color: #f1f1f1;
            padding: 20px;
        }
        .form-section {
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
        }
        /* Navbar */
        .navbar {
            display: flex;  
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgb(25, 50, 89);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color:white;
        }

        .nav-buttons {
            padding-left:20px;
            display: flex;
            gap: 15px;
        }

        .nav-button {
            background: #222;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1rem;
        }

        .nav-button:hover {
            background: #444;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<header class="navbar">
    <a href="/" class="logo" >CrimeRadar</a>
    <div class="nav-buttons">
        <button class="nav-button" onclick="redirectToIndex()">Crime Prediction</button>
        <button class="nav-button" onclick="goToNews()">Crime News</button>
        <a href="{{ url_for('dashboard') }}" style="text-decoration: none; color: inherit;">
        <button class="nav-button">Predictive Analysis</button></a>
        <button class="nav-button" onclick="goToHeatmap()">Crime Heatmap</button>
        <a class="nav-button" href="http://192.168.163.132:5000/">Crime AI</a>
    </div>
</header>
    <div class="container">
        <h2 class="text-center mb-4">🗺️ Crime Heatmap</h2>

        <form method="POST" class="form-section row g-3 align-items-center justify-content-center">
            <div class="col-auto">
                <label for="year" class="form-label">Select Year 🗓️</label>
                <select class="form-select" name="year" id="year">
                    {% for year in years %}
                        <option value="{{ year }}" {% if year == selected_year %}selected{% endif %}>{{ year }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-auto">
                <label for="crime_type" class="form-label">Select Crime Type 🔍</label>
                <select class="form-select" name="crime_type" id="crime_type">
                    {% for ctype in crime_types %}
                        <option value="{{ ctype }}" {% if ctype == selected_type %}selected{% endif %}>{{ ctype }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-auto mt-4">
                <button type="submit" class="btn btn-primary">Update Heatmap</button>
            </div>
        </form>

        <div class="mt-4">
            <iframe src="{{ url_for('static', filename='heatmap_map.html') }}"></iframe>

        </div>
    </div>

    <script>
        function redirectToIndex() {
            window.location.href = "{{ url_for('index') }}";
        }

        function goToNews() {
            window.location.href = "{{ url_for('news') }}";
        }
        function goToHeatmap() {
            window.location.href = "{{ url_for('heatmap') }}";
        }
    </script>
</body>
</html>
