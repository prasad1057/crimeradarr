<!DOCTYPE html>
<html>
<head>
    <title>Crime Heat Map</title>
    <style>
        body { font-family: Arial; text-align: center; margin: 20px; }
        form { margin-bottom: 20px; }
        iframe { border: none; width: 100%; height: 600px; }
    </style>
</head>
<body>
    <h1>Crime Heat Map</h1>

    <form method="POST">
        <label for="year">Select Year:</label>
        <select name="year" id="year">
            {% for y in years %}
                <option value="{{ y }}" {% if y == selected_year|int %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
        </select>

        <label for="crime_type">Select Crime Type:</label>
        <select name="crime_type" id="crime_type">
            {% for c in crime_types %}
                <option value="{{ c }}" {% if c == selected_type %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>

        <button type="submit">Update Map</button>
    </form>

    <div>{{ map_html|safe }}</div>
</body>
</html>
